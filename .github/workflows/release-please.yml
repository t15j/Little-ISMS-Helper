name: Release Please

# Sammelt Conventional-Commits auf main, oeffnet/aktualisiert einen
# Release-PR mit auto-generiertem CHANGELOG.md + Version-Bumps in
# composer.json + .release-please-manifest.json. Merge des PRs erzeugt
# Tag + GitHub Release. Aufgesetzt 2026-04-30 zur Stabilisierung der
# Release-Cadence (siehe CONTRIBUTING.md).

on:
  push:
    branches:
      - main
  # Manueller Trigger noetig wenn Auto-Merge-Workflow den Squash-Commit
  # mit GITHUB_TOKEN gepusht hat — solche Pushes triggern downstream
  # Workflows aus Sicherheitsgruenden nicht automatisch (GitHub-Schutz
  # vor Infinite-Loops). Workaround bis PAT-basierter Token konfiguriert
  # ist: Actions-UI → "Release Please" → Run workflow.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Pull config + manifest aus Repo-Root.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
