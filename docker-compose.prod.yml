# 🔒 PRODUCTION Docker Compose Configuration - Self-Contained (embedded MariaDB)
# ⚠️ WICHTIG: Vor Produktion-Deployment:
# 1. Ändern Sie MYSQL_PASSWORD via Environment Variable (oder leer lassen für auto-generiert)
# 2. Verwenden Sie HTTPS mit Reverse Proxy (Nginx/Traefik)
# 3. Deaktivieren Sie Debug-Mode
# 4. Beschränken Sie Port-Zugriff mit Firewall

services:
  # Little ISMS Helper Application (Self-Contained with embedded MariaDB)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      platforms:
        - linux/amd64
    container_name: little-isms-app-prod
    restart: always
    # ✅ Security: App-Port nur intern für Reverse Proxy bereitstellen
    # Port 80 zur Verfügung stellen
    expose:
      - "80"
    networks:
      - little-isms
    volumes:
      # ✅ REQUIRED: Persistente Daten (inkl. embedded MariaDB)
      # Ohne dieses Volume gehen alle Daten bei Container-Neustart verloren!
      - isms_data:/var/www/html/var
    environment:
      # ⚠️ WICHTIG: Diese müssen in .env.docker.local gesetzt werden!
      APP_ENV: prod
      APP_DEBUG: 0
      # MySQL Credentials (leer lassen für auto-generiertes Passwort)
      MYSQL_DATABASE: ${MYSQL_DATABASE:-isms}
      MYSQL_USER: ${MYSQL_USER:-isms}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      # MAILER_DSN muss für echte SMTP konfiguriert werden
      MAILER_DSN: ${MAILER_DSN:-}
      # Docker-Flag (für Setup-Wizard Detection)
      DOCKER_CONTAINER: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # Security: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=application,environment=production"

volumes:
  # ✅ Production Volumes - persistent und performant
  # REQUIRED: Enthält App-Daten UND embedded MariaDB!
  isms_data:
    driver: local

networks:
  little-isms:
    external: true
